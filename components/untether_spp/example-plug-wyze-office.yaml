# Lean ESPHome config for a Wyze outdoor plug (classic ESP32) repurposed as a multi-device
# Classic-SPP <-> TCP bridge. BLE proxy removed + power-monitoring/LUX/web_server dropped to free
# RAM for Classic BT. Keeps the relays (still a usable outlet) + Wi-Fi/API/OTA so rollback is just
# re-flashing your old config.

esphome:
  name: plug-wyze-office
  friendly_name: plug-wyze-office (SPP bridge)

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO
api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.168.63

# --- the bridge: up to 4 SPP devices, one TCP port each ---
external_components:
  - source: github://dallanwagz/untether@main
    components: [untether_spp]
    refresh: 0s

untether_spp:
  devices:
    # Pixoo / MiniToo (NewMode, no byte-stuffing) want the 0xAF connected-flag handshake on connect;
    # on_open_hex fires it automatically, so a plain `nc` client doesn't have to.
    - mac_address: AA:BB:CC:DD:EE:FF   # <-- SET to your Pixoo's BD_ADDR
      channel: 2                       # Pixoo = ch2 (MiniToo = ch1); 0 = SDP-discover
      tcp_port: 8888
      on_open_hex: "01 04 00 af 01 b4 00 02"
    # TimeBox-mini (byte-stuffed dialect) — no connect handshake needed; bridge just pipes bytes.
    - mac_address: 11:22:33:44:55:66   # <-- SET to your TimeBox-mini's control BD_ADDR (not its audio one)
      channel: 4
      tcp_port: 8889
  # For a single device, the flat form also works:
  #   untether_spp:
  #     mac_address: AA:BB:CC:DD:EE:FF
  #     channel: 2
  #     tcp_port: 8888

# --- keep the plug a usable outlet (cheap; relays restore ON) ---
switch:
  - platform: gpio
    name: Relay1
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_ON
    id: relay1
  - platform: gpio
    name: Relay2
    pin: GPIO32
    restore_mode: RESTORE_DEFAULT_ON
    id: relay2
  - platform: restart
    name: Restart

binary_sensor:
  - platform: gpio
    internal: true
    pin: { number: GPIO18, mode: INPUT_PULLDOWN, inverted: true }
    name: Button1
    on_press: { switch.toggle: relay1 }
  - platform: gpio
    internal: true
    pin: { number: GPIO17, mode: INPUT_PULLDOWN, inverted: true }
    name: Button2
    on_press: { switch.toggle: relay2 }

# NOTE: deliberately NO bluetooth_proxy / esp32_ble_tracker here — BLE is disabled to fit Classic BT.
